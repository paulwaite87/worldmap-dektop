name: Publish Docker Images to GHCR

# This triggers the workflow whenever you push to the main branch
# or when you manually trigger it from the GitHub Actions tab.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # This automatically evaluates to paulwaite87/WorldMap
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Grants the workflow permission to write to your Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # This tags your image as ghcr.io/paulwaite87/worldmap:latest
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push main image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Assuming your main Dockerfile is in the root directory
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}