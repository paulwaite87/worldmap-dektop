services:
  # Listens to AIS stream 24/7
  harvester:
    container_name: harvester
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worldmap.harvester --config /opt/project/config/worldmap.conf
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - AIS_API_KEY=${AIS_API_KEY}
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  # Manages map assets and rendering on a schedule
  map_builder:
    container_name: map_builder
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worldmap.map_builder --config /opt/project/config/worldmap.conf
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  worldmap_db:
    container_name: worldmap_db
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: wmap
      POSTGRES_PASSWORD: wmap
      POSTGRES_DB: worldmap
      PGTZ: Pacific/Auckland
    ports:
      - "15432:5432"
    restart: unless-stopped
    volumes:
      - wmap-pgdata:/var/lib/postgresql/data
      - ./config/database:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c max_wal_size=512MB
      -c min_wal_size=128MB
      -c checkpoint_timeout=15min
      -c log_checkpoints=off
      -c log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmap -d worldmap"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wmap

networks:
  wmap:
    driver: bridge

volumes:
  wmap-pgdata: