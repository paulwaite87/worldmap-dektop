name: worldmap-desktop
services:
  # Listens to AIS stream 24/7 and populates Ship positions
  shipping_collector:
    container_name: shipping_collector
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worldmap.shipping_collector --config /opt/project/config/worldmap.conf
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - AIS_API_KEY=${AIS_API_KEY}
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  # Tiles the globe/regions for lightning strikes and populates DB
  weather_scanner:
    container_name: weather_scanner
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worldmap.weather_scanner --config /opt/project/config/worldmap.conf
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  # Manages map assets and rendering on a schedule
  map_builder:
    container_name: map_builder
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worldmap.map_builder --config /opt/project/config/worldmap.conf
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./satellites:/opt/project/satellites
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  # API Core (Bridges config/db to your UI browser inputs)
  map_api:
    container_name: map_api
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Installs API runtime dependencies and targets our new api
    # module with dynamic reload enabled
    command: >
      bash -c "pip install fastapi uvicorn && uvicorn worldmap.api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
      - CONFIG_PATH=/opt/project/config/worldmap.conf
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  # Static UI Container
  map_ui:
    container_name: map_ui
    image: nginx:alpine
    ports:
      - "8280:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    depends_on:
      - map_api
    networks:
      - wmap

  worldmap_db:
    container_name: worldmap_db
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: wmap
      POSTGRES_PASSWORD: wmap
      POSTGRES_DB: worldmap
      PGTZ: Pacific/Auckland
    ports:
      - "55432:5432"
    restart: unless-stopped
    volumes:
      - wmap-pgdata:/var/lib/postgresql/data
      - ./config/database:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c max_wal_size=512MB
      -c min_wal_size=128MB
      -c checkpoint_timeout=15min
      -c log_checkpoints=off
      -c log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmap -d worldmap"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wmap

networks:
  wmap:
    driver: bridge

volumes:
  wmap-pgdata: